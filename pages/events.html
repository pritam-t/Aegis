<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Aegis AI Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hubot+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="dashboard active">
        <!-- Top Bar with Navigation -->
        <div class="topbar">
            <div class="topbar-left">
                <div class="logo">AEGIS</div>
                <ul class="nav-menu">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="events.html" class="active">Events</a></li>
                    <li><a href="statistics.html">Statistics</a></li>
                </ul>
            </div>
            <div class="topbar-right">
                <div class="admin-name">Admin</div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Events Page Content -->
        <div class="content">
            <h1 class="section-header">Violation Events</h1>

            <!-- Summary Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Today's Events</h3>
                    <span class="skeleton skeleton-stat-number" id="skel-todayCount"></span>
                    <p id="todayCount" style="display:none;">–</p>
                </div>
                <div class="stat-card" style="border-left-color: #dc3545;">
                    <h3>High Confidence (&gt;95%)</h3>
                    <span class="skeleton skeleton-stat-number" id="skel-highConfidence"></span>
                    <p id="highConfidence" style="display:none;">–</p>
                </div>
                <div class="stat-card" style="border-left-color: #ffc107;">
                    <h3>Pending Payment</h3>
                    <span class="skeleton skeleton-stat-number" id="skel-pendingPayment"></span>
                    <p id="pendingPayment" style="display:none;">–</p>
                </div>
            </div>

            <!-- Skeleton placeholder for violations table -->
            <div id="violationsSkeleton">
                <!-- Skeleton card 1 -->
                <div class="card">
                    <span class="skeleton skeleton-title"></span>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th><th>Number Plate</th><th>Timestamp</th>
                                    <th>Confidence</th><th>Violation Type</th>
                                    <th>Violation Fine</th><th>Fine Paid</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 5 skeleton rows -->
                                <tr><td colspan="7"><div class="skeleton-row">
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:12%"></span>
                                    <span class="skeleton skeleton-cell" style="width:18%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                </div></td></tr>
                                <tr><td colspan="7"><div class="skeleton-row">
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:12%"></span>
                                    <span class="skeleton skeleton-cell" style="width:18%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                </div></td></tr>
                                <tr><td colspan="7"><div class="skeleton-row">
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:12%"></span>
                                    <span class="skeleton skeleton-cell" style="width:18%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                </div></td></tr>
                                <tr><td colspan="7"><div class="skeleton-row">
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:12%"></span>
                                    <span class="skeleton skeleton-cell" style="width:18%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                </div></td></tr>
                                <tr><td colspan="7"><div class="skeleton-row">
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:12%"></span>
                                    <span class="skeleton skeleton-cell" style="width:18%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:14%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                    <span class="skeleton skeleton-cell" style="width:10%"></span>
                                </div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Real violations content (hidden until loaded) -->
            <div id="violationsContainer" style="display:none;"></div>
        </div>
    </div>

    <!-- External Scripts -->
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/events.js"></script>
</body>
</html>
